<!DOCTYPE html>
<html>
<head>
<title>Card Design</title>

<style>

body{
    font-family: Arial;
    background-color: #eef2f7;
}

/* Container to hold multiple cards */
.container{
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 50px;
}

/* Card Design */
.card{
    width: 250px;
    border: 1px solid #ccc;
    padding: 15px;
    margin: 10px;
    text-align: center;
    background-color: #ffffff;
    border-radius: 10px;
}

/* Image */
.card img{
    width: 100%;
    border-radius: 10px;
}

/* Button */
button{
    background-color: #2563EB;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover{
    background-color: #1e40af;
}

</style>

</head>

<body>

<h1 style="text-align:center;">My Card Design</h1>

<div class="container">

    <div class="card">
         <img src="https://via.placeholder.com/250"> 
        <h3>Web Development</h3>
        <p>Learn HTML, CSS and JavaScript to build websites.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250"> 
        <h3>Programming</h3>
        <p>Improve your coding skills with practice.</p>
        <button>Read More</button>
    </div>

    <div class="card">
       <img src="https://via.placeholder.com/250"> 
        <h3>Projects</h3>
        <p>Create real-world projects to boost your resume.</p>
        <button>Read More</button>
    </div>

</div>

</body>
</html>
