<!DOCTYPE html>
<html>
<head>
<title>Flexbox Cards</title>

<style>
.container{
    display: flex;
    justify-content: center;
    gap: 20px;
}

.card{
    width: 200px;
    padding: 15px;
    background-color: #f0f0f0;
    text-align: center;
}

button{
    background-color: blue;
    color: white;
    border: none;
    padding: 8px;
    cursor: pointer;
}

button:hover{
    background-color: black;
}
</style>

</head>

<body>

<h1 style="text-align:center;">Flexbox Cards</h1>

<div class="container">

<div class="card">
<h3>Card 1</h3>
<p>Description</p>
<button>Click</button>
</div>

<div class="card">
<h3>Card 2</h3>
<p>Description</p>
<button>Click</button>
</div>

<div class="card">
<h3>Card 3</h3>
<p>Description</p>
<button>Click</button>
</div>

</div>

</body>
</html>
