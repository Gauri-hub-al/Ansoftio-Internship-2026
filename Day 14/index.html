<!DOCTYPE html>
<html>
<head>
<title>Product Page</title>

<style>
body{
  font-family: Arial;
  text-align: center;
}

/* Product Card */
.product{
  border: 1px solid #ccc;
  padding: 20px;
  margin: 40px auto;
  width: 300px;
  border-radius: 10px;
}

.product img{
  width: 100%;
}

button{
  background-color: #2563EB;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

button:hover{
  background-color: black;
}
</style>

</head>

<body>

<div class="product">
  <img src="https://via.placeholder.com/300">
  <h2>Smart Watch</h2>
  <p>Track your fitness and stay connected.</p>
  <p><b>Price: ₹1999</b></p>
  <button>Buy Now</button>
</div>

</body>
</html>
