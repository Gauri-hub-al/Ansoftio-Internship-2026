<!DOCTYPE html>
<html>
<head>
    <title>DOM Task</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 200px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>

</head>
<body>

    <!-- Heading -->
    <h1 id="heading">Welcome Student</h1>

    <!-- Input Field -->
    <input type="text" id="name" placeholder="Enter your name">

    <br><br>

    <!-- Button -->
    <button onclick="updateName()">Update Name</button>

    <!-- JavaScript -->
    <script>
        function updateName() {
            let username = document.getElementById("name").value;

            if(username === "") {
                alert("Please enter your name!");
            } else {
                document.getElementById("heading").innerHTML = "Welcome " + username;
            }
        }
    </script>

</body>
</html>
